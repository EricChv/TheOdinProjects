<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>

    <h1>Rock-Paper-Scissors Game</h1>
    <div id="playerChoices">
        <button onclick="playRound('rock')">Rock</button>
        <button onclick="playRound('paper')">Paper</button>
        <button onclick="playRound('scissors')">Scissors</button>
    </div>
    <div id="roundResults"></div>
    <div id="finalResult"></div>

    <div>
        <button id="restartButton" class="hide-button" onclick="resetGame()">Restart Game</button>
    </div>
</body>
</html>
